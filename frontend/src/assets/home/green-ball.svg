<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="16" height="16" style="margin-right: 6px; vertical-align: middle;">
    <!-- 圆形主体（蓝色渐变，和柱状图颜色呼应） -->
    <circle cx="12" cy="12" r="7" fill="url(#blueBallGradient)" />
    <!-- 渐变定义（和柱状图的蓝渐变一致） -->
    <defs>
        <linearGradient id="blueBallGradient" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#99eeee" />
            <stop offset="100%" stop-color="#3eccc6" />
        </linearGradient>
    </defs>
</svg>
