server:
  port: 8081

grpc:
  server:
    port: 9090
    keep-alive-time: 60s
    max-inbound-message-size: 16777216  # 16MB

spring:
  application:
    name: qknow-hermes
  ai:
    openai:
      api-key: ${HERMES_OPENAI_API_KEY:sk-placeholder}
      base-url: ${HERMES_OPENAI_BASE_URL:https://api.deepseek.com}
    ollama:
      base-url: ${HERMES_OLLAMA_BASE_URL:http://localhost:11434}

hermes:
  control-plane:
    base-url: ${HERMES_CONTROL_PLANE_URL:http://localhost:8099}
    connect-timeout: 5000
    read-timeout: 30000
  agent:
    max-tool-calls: 10
    default-max-retries: 3
  tool:
    timeout: 30000
    retry:
      maxAttempts: 3
    circuitBreaker:
      threshold: 5
      recoveryTimeout: 60000
    webSearch:
      provider: ${HERMES_SEARCH_PROVIDER:duckduckgo}  # Options: serper, bing, duckduckgo
  judge:
    enabled: true
    min-score: 0.6
    max-reflection-rounds: 3
  reflection:
    enabled: true
    max-rounds: 3
  eval:
    enabled: false
  memory:
    short-term:
      max-messages: 50
    long-term:
      enabled: false
  rag:
    cache:
      enabled: true
      ttl: 300000

logging:
  level:
    tech.qiantong.qknow.hermes: DEBUG
    io.grpc: INFO
