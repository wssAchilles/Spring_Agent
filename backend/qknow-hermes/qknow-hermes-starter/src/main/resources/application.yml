server:
  port: 8081

grpc:
  server:
    port: 9090
    keep-alive-time: 60s
    max-inbound-message-size: 16777216  # 16MB

spring:
  application:
    name: qknow-hermes
  ai:
    openai:
      api-key: ${HERMES_OPENAI_API_KEY:sk-placeholder}
      base-url: ${HERMES_OPENAI_BASE_URL:https://api.deepseek.com}
    ollama:
      base-url: ${HERMES_OLLAMA_BASE_URL:http://localhost:11434}

hermes:
  judge:
    enabled: false  # 关闭反思循环，省 ~15% tokens
    min-score: 0.6
    max-reflection-rounds: 3
  reflection:
    enabled: false  # 关闭反思
    max-rounds: 3
  eval:
    enabled: false
  memory:
    short-term:
      max-messages: 50
    long-term:
      enabled: false
  rag:
    cache:
      enabled: true
      ttl: 300
  observability:
    langfuse:
      enabled: ${LANGFUSE_ENABLED:false}
      public-key: ${LANGFUSE_PUBLIC_KEY:}
      secret-key: ${LANGFUSE_SECRET_KEY:}
      base-url: ${LANGFUSE_BASE_URL:https://cloud.langfuse.com}

qknow:
  hermes:
    plan-solve:
      enabled: false
      max-tasks: 5
      max-reflection-retries: 1
      complex-keywords:
        - 对比
        - 比较
        - 分析
        - 总结
        - 综合
        - 分别
        - 最后
        - 写成
        - 财报
        - 邮件
  rag:
    eval:
      threshold: 0.85
      platform: DeepSeek
      model-name: deepseek-chat
      base-url: ${HERMES_OPENAI_BASE_URL:https://api.deepseek.com/v1}
      api-key: ${HERMES_OPENAI_API_KEY:}

logging:
  level:
    tech.qiantong.qknow.hermes: DEBUG
    io.grpc: INFO
