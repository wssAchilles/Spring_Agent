syntax = "proto3";
package tech.qiantong.qknow.hermes;

option java_multiple_files = true;
option java_package = "tech.qiantong.qknow.hermes.proto";
option java_outer_classname = "HermesProto";

import "google/protobuf/timestamp.proto";

// ============================================================
// Main gRPC Service
// ============================================================
service HermesService {

  // ReactAgent streaming chat - server-streaming RPC
  rpc Chat (ChatRequest) returns (stream ChatEvent);

  // DAG flow execution - server-streaming RPC
  rpc ExecuteFlow (FlowRequest) returns (stream FlowEvent);

  // Health check
  rpc HealthCheck (HealthRequest) returns (HealthResponse);
}

// ============================================================
// Chat Messages (ReactAgent path)
// ============================================================
message ChatRequest {
  string request_id = 1;
  int64 bot_id = 2;
  int64 workspace_id = 3;
  string question = 4;
  string input_params = 5;           // JSON: template variables
  ModelConfig model_config = 6;
  string system_prompt = 7;
  repeated string knowledge_ids = 8;
  repeated string tool_method_ids = 9;
  repeated ChatMessage history = 10;
  ModelCredentials model_credentials = 11;  // Pre-resolved from control plane
  repeated RAGContext rag_contexts = 12;    // Pre-retrieved RAG results
}

message ModelConfig {
  int64 model_id = 1;
  string model_name = 2;
  string platform = 3;              // "openai", "dashscope", "deepseek", "ollama"
  string base_url = 4;
  string api_key = 5;
}

message ModelCredentials {
  string platform = 1;
  string base_url = 2;
  string api_key = 3;
}

message RAGContext {
  string knowledge_id = 1;
  string knowledge_name = 2;
  string pre_retrieved_content = 3;
}

message ChatMessage {
  string role = 1;                  // "user" or "assistant"
  string content = 2;
}

message ChatEvent {
  string request_id = 1;

  oneof event {
    StreamingChunk chunk = 2;       // AGENT_MODEL_STREAMING
    ModelFinished finished = 3;     // AGENT_MODEL_FINISHED
    ToolInvoked tool_invoked = 4;   // AGENT_TOOL_FINISHED
    ErrorEvent error = 5;           // Error
    DoneSignal done = 6;            // Stream complete
  }
}

message StreamingChunk {
  string text = 1;
  string user_question = 2;
  google.protobuf.Timestamp create_time = 3;
}

message ModelFinished {
  string full_text = 1;
}

message ToolInvoked {
  string tool_name = 1;
  string status = 2;                // "success" or "error"
}

message ErrorEvent {
  int32 code = 1;
  string message = 2;
}

message DoneSignal {}

// ============================================================
// Flow Messages (DAG engine path)
// ============================================================
message FlowRequest {
  string request_id = 1;
  string flow_id = 2;
  repeated FlowNode nodes = 3;
  repeated FlowEdge edges = 4;
  string runtime_context_json = 5;
}

message FlowNode {
  string uuid = 1;
  string name = 2;
  string type = 3;                  // "START", "LLM", "REPLY", "CONDITION"
  string config = 4;                // JSON config
  string input = 5;                 // JSON input definition
}

message FlowEdge {
  string source_node_uuid = 1;
  string target_node_uuid = 2;
}

message FlowEvent {
  string request_id = 1;

  oneof event {
    NodeResult node_result = 2;
    FlowCompleted flow_completed = 3;
    ErrorEvent error = 4;
  }
}

message NodeResult {
  string node_uuid = 1;
  string node_name = 2;
  int32 status = 3;                 // RuntimeStatusEnums code
  string output_json = 4;
  int64 duration_ms = 5;
}

message FlowCompleted {
  repeated NodeResult results = 1;
}

// ============================================================
// Health
// ============================================================
message HealthRequest {}

message HealthResponse {
  string status = 1;                // "UP" or "DOWN"
  string version = 2;
}
