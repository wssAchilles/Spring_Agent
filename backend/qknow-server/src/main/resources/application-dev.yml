


# 主数据源选择
datasource:
  type: postgresql

# Spring配置
spring:
  neo4j:
    uri: ""
  # redis 配置
  data:
    redis:
      # 地址
      host: 127.0.0.1
      # 端口，默认为6379
      port: 6379
      # 数据库索引
      database: 3
      # 密码
      password:
      # 连接超时时间
      timeout: 10s
      lettuce:
        pool:
          # 连接池中的最小空闲连接
          min-idle: 0
          # 连接池中的最大空闲连接
          max-idle: 8
          # 连接池的最大数据库连接数
          max-active: 8
          # #连接池最大阻塞等待时间（使用负值表示没有限制）
          max-wait: -1ms

  datasource:
    druid:
      stat-view-servlet:
        # 是否启用Druid的监控统计功能
        enabled: true
        # 访问Druid监控页面的用户名
        loginUsername: qknow
        # 访问Druid监控页面的密码
        loginPassword: qknow123456
    dynamic:
      druid:
        # 连接池初始化时创建的连接数量
        initial-size: 5
        # 连接池中最小空闲连接数
        min-idle: 5
        # 连接池中最大活动连接数
        maxActive: 20
        # 连接池等待连接的最长时间（毫秒）
        maxWait: 60000
        # 数据库连接超时时间（毫秒）
        connectTimeout: 30000
        # Socket超时时间（毫秒）
        socketTimeout: 60000
        # 空闲连接的检测周期（毫秒）
        timeBetweenEvictionRunsMillis: 60000
        # 最小空闲连接的存活时间（毫秒）
        minEvictableIdleTimeMillis: 300000
        # 用于检测连接是否有效的SQL语句
        validationQuery: SELECT 1
        # 是否在空闲时检测连接的有效性
        testWhileIdle: true
        # 借用连接时是否测试连接的有效性
        testOnBorrow: false
        # 归还连接时是否测试连接的有效性
        testOnReturn: false
        # 是否打开连接池的PreparedStatement缓存
        poolPreparedStatements: true
        # 每个连接池的PreparedStatement缓存上限
        maxPoolPreparedStatementPerConnectionSize: 20
        # 配置Druid的过滤器
        filters: stat,slf4j
        # Druid连接属性配置
        connectionProperties: druid.stat.mergeSql\=true;druid.stat.slowSqlMillis\=5000
      datasource:
        # 主库数据源配置
        master:
          # 动态加载的配置属性
          driver-class-name: ${${datasource.type}.driver-class-name}
          url: ${${datasource.type}.url}
          username: ${${datasource.type}.username}
          password: ${${datasource.type}.password}
#        test:
#          driver-class-name: dm.jdbc.driver.DmDriver
#          url: jdbc:dm://127.0.0.1:5236/MOON?STU&zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8&schema=MOON&serverTimezone=Asia/Shanghai
#          username: MOON
#          password: 1234567890

# PostgreSQL配置文件
postgresql:
  # JDBC驱动类名
  driver-class-name: org.postgresql.Driver
  # 主库JDBC连接URL
  url: jdbc:postgresql://127.0.0.1:5432/ai_agent?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
  # 主库用户名
  username: ${POSTGRESQL_USERNAME:postgres}
  # 主库密码
  password: ${POSTGRESQL_PASSWORD:postgres}

# MySQL配置文件 (已迁移到PostgreSQL，保留备用)
mysql:
  # JDBC驱动类名
  driver-class-name: com.mysql.cj.jdbc.Driver
  # 主库JDBC连接URL
  url: jdbc:mysql://127.0.0.1:3306/qknow_dev?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=true&serverTimezone=GMT%2B8
  # 主库用户名
  username: root
  # 主库密码
  password: admin

# 达梦配置文件
dm8:
  # JDBC驱动类名
  driver-class-name: dm.jdbc.driver.DmDriver
  # 主库JDBC连接URL
  url: jdbc:dm://127.0.0.1:5236/ANIVIA?STU&zeroDateTimeBehavior=convertToNull&useUnicode=true&characterEncoding=utf-8&schema=ANIVIA&serverTimezone=Asia/Shanghai
  # 主库用户名
  username:
  # 主库密码
  password:

# 人大金仓配置文件
kingbase8:
  # JDBC驱动类名
  driver-class-name: com.kingbase8.Driver
  # 主库JDBC连接URL
  url: jdbc:kingbase8://127.0.0.1:54321/qknow_dev?characterEncoding=utf8&connectTimeout=1000&socketTimeout=3000&autoReconnect=true&useUnicode=true&useSSL=false&serverTimezone=UTC&currentSchema=qknow
  # 主库用户名
  username:
  # 主库密码
  password:

# Oracle12c 配置文件
oracle:
  # JDBC驱动类名
  driver-class-name: oracle.jdbc.OracleDriver
  # 主库JDBC连接URL
  url: jdbc:oracle:thin:@127.0.0.1:1521:xe?oracle.jdbc.timezoneAsRegion=true&oracle.jdbc.defaultTimezone=Asia/Shanghai&currentSchema=ANIVIA
  # 主库用户名
  username:
  # 主库密码
  password:

## 工作流模块的访问地址
flow:
  enable: false
  url: http://127.0.0.1:26859/

# Hermes 微服务 gRPC 配置
hermes:
  grpc:
    host: ${HERMES_GRPC_HOST:localhost}
    port: ${HERMES_GRPC_PORT:9090}
  rag:
    contextual:
      enabled: true
      platform: DeepSeek
      base-url: https://api.deepseek.com
      api-key: ${HERMES_OPENAI_API_KEY:}
      model-name: deepseek-chat
      max-doc-chars: 8000
      max-concurrent: 3
    router:
      enabled: true
      platform: DeepSeek
      base-url: https://api.deepseek.com
      api-key: ${HERMES_OPENAI_API_KEY:}
      model-name: deepseek-chat
    hype:
      enabled: true
      platform: DeepSeek
      base-url: https://api.deepseek.com
      api-key: ${HERMES_OPENAI_API_KEY:}
      model-name: deepseek-chat
      question-count: 3
      max-chunk-chars: 2000
      timeout-seconds: 30
      max-chunks-per-document: 20
    colbert:
      enabled: true
      ngram-size: 3

# Neo4j 配置（未部署时禁用）
neo4j:
  uri: ${NEO4J_URI:}
  user: ${NEO4J_USER:}
  password: ${NEO4J_PASSWORD:}
